# Renovate – dependency updates via renovatebot/github-action
#
# The workflow (GitHub Actions) creates the PRs; commits are authored by dytsou
# via gitAuthor in .github/renovate.json. Uses GITHUB_TOKEN so PRs show as from
# github-actions[bot]. Note: PRs created with GITHUB_TOKEN may not trigger other
# workflows (e.g. Test) on push; you can re-run them manually or use a PAT if needed.
#
# See: https://github.com/renovatebot/github-action
name: Renovate

on:
  schedule:
    # Weekly, same cadence as previous Dependabot setup
    - cron: "0 9 * * 5"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: "optional"
        with:
          configurationFile: .github/renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
