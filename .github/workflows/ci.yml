name: CI Checks
permissions:
  contents: read
  pull-requests: read

on:
  push: # Runs on push to any branch
  pull_request: # Also runs on PRs to any branch

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build
        env:
          # Served under the front door at dy.tsou.me/resume/, so assets must be prefixed.
          BASE_PATH: /resume/
          VITE_GOOGLE_DRIVE_RESUME_LINK: ${{ vars.VITE_GOOGLE_DRIVE_RESUME_LINK }}

      - name: Verify build output
        if: github.ref == 'refs/heads/main'
        run: |
          test -f dist/index.html
          # Assets must be prefixed for the front-door mount at /resume/.
          grep -q '"/resume/assets/' dist/index.html \
            || grep -q "'/resume/assets/" dist/index.html \
            || grep -q '/resume/assets/' dist/index.html

      - name: Verify deploy contract
        if: github.ref == 'refs/heads/main'
        run: |
          node --input-type=module -e "
            import { readFileSync, existsSync } from 'node:fs';
            const c = JSON.parse(readFileSync('deploy-contract.json', 'utf8'));
            if (c.ownerRepo !== 'dytsou/resume') throw new Error('ownerRepo');
            if (c.outputDir !== 'dist') throw new Error('outputDir');
            if (!existsSync('dist/index.html')) throw new Error('missing dist/index.html');
            console.log('verify-deploy-contract: ok');
          "

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist
          retention-days: 1
          if-no-files-found: error
